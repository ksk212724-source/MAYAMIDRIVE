<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MayamiDrift</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --c-bg:#0b0c10;
  --c-road:#1a1b22;
  --c-line:#e8e0c8;
  --c-accent:#f5a623;
  --c-red:#e63946;
  --c-blue:#4cc9f0;
  --c-green:#57cc99;
  --c-ui:#f0ece2;
  --c-dim:#888;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--c-bg);
  display:flex;justify-content:center;align-items:center;
  height:100vh;overflow:hidden;
  font-family:'Rajdhani',sans-serif;
}
#wrap{position:relative;width:100vw;height:100vh;max-width:420px;margin:0 auto;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;
  padding:12px 16px;pointer-events:none;z-index:10;
  display:flex;justify-content:space-between;align-items:flex-start;
}
#scoreBox{display:flex;flex-direction:column;gap:2px}
#scoreLbl{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,38px);color:#fff;line-height:1;letter-spacing:1px}
#bestLbl{font-size:clamp(10px,2.5vw,13px);color:var(--c-dim);letter-spacing:2px;text-transform:uppercase}
#rightHud{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
#livesRow{display:flex;gap:5px}
.hrt{width:clamp(14px,4vw,20px);height:clamp(14px,4vw,20px)}
#speedBar{width:60px;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
#speedFill{height:100%;background:linear-gradient(90deg,var(--c-green),var(--c-accent));border-radius:3px;width:0%;transition:width 0.3s}
#comboBox{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,12vw,72px);
  color:var(--c-accent);text-align:center;pointer-events:none;z-index:15;
  opacity:0;transition:opacity 0.2s;text-shadow:0 0 30px rgba(245,166,35,0.6);
}

/* pause btn */
#pauseBtn{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.6);font-family:'Rajdhani',sans-serif;font-size:13px;
  letter-spacing:2px;padding:4px 14px;cursor:pointer;pointer-events:all;z-index:11;
  border-radius:20px;display:none;text-transform:uppercase;
  backdrop-filter:blur(4px);
}

/* touch zones */
#controls{position:absolute;inset:0;display:flex;pointer-events:none;z-index:5}
#ctrlLeft,#ctrlRight{flex:1;height:100%;pointer-events:all}

/* overlays base */
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:20;gap:0;
}
.screen.hidden{display:none}

/* ── START / GAMEOVER overlay ── */
#mainOverlay{background:#0b0c10}
#mainOverlay::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 30%, rgba(245,166,35,0.08) 0%, transparent 70%);
  pointer-events:none;
}
.ov-tag{
  font-size:clamp(10px,2.8vw,13px);color:var(--c-accent);
  letter-spacing:5px;text-transform:uppercase;margin-bottom:12px;
  font-family:'Rajdhani',sans-serif;font-weight:600;
}
.ov-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,16vw,96px);
  color:#fff;line-height:0.9;letter-spacing:2px;text-align:center;
  margin-bottom:8px;
}
.ov-title span{color:var(--c-accent)}
.ov-sub{
  font-size:clamp(11px,3vw,14px);color:var(--c-dim);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;
}
.ov-stat-row{
  display:flex;gap:32px;margin-bottom:36px;
}
.ov-stat{display:flex;flex-direction:column;align-items:center;gap:4px}
.ov-stat-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,8vw,42px);color:#fff}
.ov-stat-lbl{font-size:11px;color:var(--c-dim);letter-spacing:2px;text-transform:uppercase}
.ov-btn{
  padding:14px 52px;
  background:var(--c-accent);
  border:none;color:#000;
  font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5vw,26px);
  letter-spacing:3px;cursor:pointer;border-radius:4px;
  transition:transform 0.12s,box-shadow 0.12s;
  box-shadow:0 4px 24px rgba(245,166,35,0.4);
}
.ov-btn:active{transform:scale(0.96);box-shadow:0 2px 10px rgba(245,166,35,0.3)}
.ov-btn-sec{
  margin-top:12px;padding:10px 32px;
  background:transparent;border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.5);font-family:'Rajdhani',sans-serif;
  font-size:clamp(12px,3vw,15px);letter-spacing:3px;cursor:pointer;
  border-radius:4px;text-transform:uppercase;
  transition:all 0.12s;
}
.ov-btn-sec:active{background:rgba(255,255,255,0.07)}

/* ── PAUSE overlay ── */
#pauseOverlay{
  background:rgba(11,12,16,0.92);backdrop-filter:blur(8px);
}
#pauseOverlay .ov-title{font-size:clamp(48px,14vw,80px);margin-bottom:32px}

/* divider */
.ov-divider{
  width:40px;height:2px;background:var(--c-accent);
  margin:16px auto 28px;border-radius:2px;
}

/* coin pickup flash */
#coinFlash{
  position:absolute;inset:0;pointer-events:none;z-index:14;
  background:radial-gradient(circle at 50% 50%, rgba(255,220,60,0.18) 0%, transparent 70%);
  opacity:0;transition:opacity 0.1s;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="scoreBox">
      <div id="scoreLbl">0</div>
      <div id="bestLbl">BEST: 0</div>
    </div>
    <div id="rightHud">
      <div id="livesRow"></div>
      <div id="speedBar"><div id="speedFill"></div></div>
    </div>
  </div>
  <div id="comboBox"></div>
  <div id="coinFlash"></div>
  <button id="pauseBtn">&#9646;&#9646; PAUSE</button>

  <div id="controls"><div id="ctrlLeft"></div><div id="ctrlRight"></div></div>

  <!-- Main overlay (start / game over) -->
  <div id="mainOverlay" class="screen">
    <div class="ov-tag" id="ovTag">Street Racing</div>
    <div class="ov-title" id="ovTitle">MAYAMI<br><span>DRIFT</span></div>
    <div class="ov-sub" id="ovSub">Swipe left or right to dodge</div>
    <div class="ov-stat-row" id="ovStats" style="display:none">
      <div class="ov-stat"><div class="ov-stat-val" id="ovStatScore">0</div><div class="ov-stat-lbl">Score</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="ovStatBest">0</div><div class="ov-stat-lbl">Best</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="ovStatCoins">0</div><div class="ov-stat-lbl">Coins</div></div>
    </div>
    <button class="ov-btn" id="startBtn">PLAY</button>
    <button class="ov-btn-sec" id="startSecBtn" style="display:none">MAIN MENU</button>
  </div>

  <!-- Pause overlay -->
  <div id="pauseOverlay" class="screen hidden">
    <div class="ov-title">PAUSE</div>
    <div class="ov-divider"></div>
    <button class="ov-btn" id="resumeBtn">RESUME</button>
    <button class="ov-btn-sec" id="pauseRestartBtn">RESTART</button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── canvas setup ── */
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('wrap');
if(window.Telegram&&window.Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}

var W,H,DPR;
function resize(){
  DPR=window.devicePixelRatio||1;
  W=wrap.clientWidth; H=wrap.clientHeight;
  canvas.width=W*DPR; canvas.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(game)game.resize(W,H);
}
window.addEventListener('resize',resize);
resize();

/* ── music ── */
var music=null;
function initMusic(){
  if(!music){music=new Audio('music.mp3');music.loop=true;music.volume=0.32;}
  music.play().catch(function(){});
}
function pauseMusic(){if(music)music.pause();}
function resumeMusic(){if(music)music.play().catch(function(){});}
function stopMusic(){if(music){music.pause();music.currentTime=0;}}

/* ── storage ── */
var bestScore=0;
try{bestScore=parseInt(localStorage.getItem('md_best'))||0;}catch(e){}
function saveBest(s){if(s>bestScore){bestScore=s;try{localStorage.setItem('md_best',s);}catch(e){}}}

/* ────────────────────────────────────────────
   ASSET DRAWING  (all via canvas, no external files needed)
   ──────────────────────────────────────────── */

/* Draw a car onto an offscreen canvas and return it */
function makePlayerCar(pw,ph){
  var c=document.createElement('canvas');
  c.width=pw; c.height=ph;
  var g=c.getContext('2d');
  var w=pw,h=ph;

  // body shadow
  g.save(); g.shadowColor='rgba(0,180,255,0.5)'; g.shadowBlur=pw*0.3;
  // body shape
  g.beginPath();
  g.moveTo(w*0.18,h*0.92); g.lineTo(w*0.06,h*0.72); g.lineTo(w*0.06,h*0.28);
  g.quadraticCurveTo(w*0.06,h*0.06, w*0.5,h*0.04);
  g.quadraticCurveTo(w*0.94,h*0.06, w*0.94,h*0.28);
  g.lineTo(w*0.94,h*0.72); g.lineTo(w*0.82,h*0.92); g.closePath();
  var bg=g.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#1e3a5f'); bg.addColorStop(0.5,'#2a5298'); bg.addColorStop(1,'#1a2e4a');
  g.fillStyle=bg; g.fill();
  g.restore();

  // body outline
  g.beginPath();
  g.moveTo(w*0.18,h*0.92); g.lineTo(w*0.06,h*0.72); g.lineTo(w*0.06,h*0.28);
  g.quadraticCurveTo(w*0.06,h*0.06, w*0.5,h*0.04);
  g.quadraticCurveTo(w*0.94,h*0.06, w*0.94,h*0.28);
  g.lineTo(w*0.94,h*0.72); g.lineTo(w*0.82,h*0.92); g.closePath();
  g.strokeStyle='#4cc9f0'; g.lineWidth=1.5; g.stroke();

  // hood stripe
  g.beginPath(); g.moveTo(w*0.5,h*0.04); g.lineTo(w*0.5,h*0.38);
  g.strokeStyle='rgba(76,201,240,0.3)'; g.lineWidth=w*0.08; g.stroke();

  // windshield
  g.beginPath();
  g.moveTo(w*0.22,h*0.36); g.lineTo(w*0.28,h*0.16);
  g.lineTo(w*0.72,h*0.16); g.lineTo(w*0.78,h*0.36); g.closePath();
  var wg=g.createLinearGradient(0,h*0.16,0,h*0.36);
  wg.addColorStop(0,'rgba(180,230,255,0.7)'); wg.addColorStop(1,'rgba(80,160,220,0.3)');
  g.fillStyle=wg; g.fill();
  // glare
  g.beginPath(); g.moveTo(w*0.30,h*0.17); g.lineTo(w*0.44,h*0.17); g.lineTo(w*0.38,h*0.32); g.lineTo(w*0.27,h*0.32); g.closePath();
  g.fillStyle='rgba(255,255,255,0.18)'; g.fill();

  // rear window
  g.beginPath();
  g.moveTo(w*0.24,h*0.78); g.lineTo(w*0.28,h*0.62); g.lineTo(w*0.72,h*0.62); g.lineTo(w*0.76,h*0.78); g.closePath();
  var rg=g.createLinearGradient(0,h*0.62,0,h*0.78);
  rg.addColorStop(0,'rgba(80,140,200,0.35)'); rg.addColorStop(1,'rgba(40,80,130,0.5)');
  g.fillStyle=rg; g.fill();

  // roof
  g.beginPath();
  g.moveTo(w*0.22,h*0.36); g.lineTo(w*0.24,h*0.62); g.lineTo(w*0.76,h*0.62); g.lineTo(w*0.78,h*0.36); g.closePath();
  g.fillStyle='#0d1f36'; g.fill();

  // door lines
  g.strokeStyle='rgba(76,201,240,0.4)'; g.lineWidth=1;
  g.beginPath(); g.moveTo(w*0.5,h*0.38); g.lineTo(w*0.5,h*0.62); g.stroke();
  g.beginPath(); g.moveTo(w*0.22,h*0.36); g.lineTo(w*0.22,h*0.62); g.stroke();
  g.beginPath(); g.moveTo(w*0.78,h*0.36); g.lineTo(w*0.78,h*0.62); g.stroke();

  // wheels
  function wheel(x,y,rw,rh){
    g.save();
    g.fillStyle='#111'; g.strokeStyle='#333'; g.lineWidth=1.5;
    g.beginPath(); g.ellipse(x,y,rw,rh,0,0,Math.PI*2); g.fill(); g.stroke();
    // rim
    g.fillStyle='#555'; g.beginPath(); g.ellipse(x,y,rw*0.65,rh*0.65,0,0,Math.PI*2); g.fill();
    g.strokeStyle='#888'; g.lineWidth=0.8;
    for(var i=0;i<5;i++){
      var a=i*Math.PI*2/5;
      g.beginPath(); g.moveTo(x,y); g.lineTo(x+Math.cos(a)*rw*0.55,y+Math.sin(a)*rh*0.55); g.stroke();
    }
    g.restore();
  }
  wheel(w*0.12,h*0.22,w*0.1,h*0.07);
  wheel(w*0.88,h*0.22,w*0.1,h*0.07);
  wheel(w*0.12,h*0.78,w*0.1,h*0.07);
  wheel(w*0.88,h*0.78,w*0.1,h*0.07);

  // mirrors
  g.fillStyle='#1a3a5c'; g.strokeStyle='#4cc9f0'; g.lineWidth=1;
  g.beginPath(); g.ellipse(w*0.04,h*0.32,w*0.05,h*0.028,0,0,Math.PI*2); g.fill(); g.stroke();
  g.beginPath(); g.ellipse(w*0.96,h*0.32,w*0.05,h*0.028,0,0,Math.PI*2); g.fill(); g.stroke();

  // headlights
  g.save(); g.shadowColor='rgba(200,240,255,0.9)'; g.shadowBlur=pw*0.15;
  g.fillStyle='#e0f4ff';
  g.beginPath(); g.ellipse(w*0.28,h*0.06,w*0.1,h*0.025,0,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(w*0.72,h*0.06,w*0.1,h*0.025,0,0,Math.PI*2); g.fill();
  g.restore();

  // tail lights
  g.save(); g.shadowColor='rgba(220,30,30,0.8)'; g.shadowBlur=pw*0.12;
  g.fillStyle='#ff3b3b';
  g.beginPath(); g.ellipse(w*0.26,h*0.93,w*0.1,h*0.02,0,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(w*0.74,h*0.93,w*0.1,h*0.02,0,0,Math.PI*2); g.fill();
  g.restore();

  return c;
}

function makeEnemyCar(ew,eh,type){
  var c=document.createElement('canvas');
  c.width=ew; c.height=eh;
  var g=c.getContext('2d');
  var w=ew,h=eh;

  if(type===0){
    // Sedan - dark red
    g.save(); g.shadowColor='rgba(180,30,30,0.5)'; g.shadowBlur=w*0.25;
    g.beginPath();
    g.moveTo(w*0.18,h*0.08); g.lineTo(w*0.06,h*0.28); g.lineTo(w*0.06,h*0.72);
    g.lineTo(w*0.18,h*0.92); g.lineTo(w*0.82,h*0.92); g.lineTo(w*0.94,h*0.72);
    g.lineTo(w*0.94,h*0.28); g.lineTo(w*0.82,h*0.08); g.closePath();
    var bg=g.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#3a0a0a'); bg.addColorStop(0.5,'#6b1111'); bg.addColorStop(1,'#2e0808');
    g.fillStyle=bg; g.fill(); g.restore();
    g.strokeStyle='#c0392b'; g.lineWidth=1.5;
    g.beginPath();
    g.moveTo(w*0.18,h*0.08); g.lineTo(w*0.06,h*0.28); g.lineTo(w*0.06,h*0.72);
    g.lineTo(w*0.18,h*0.92); g.lineTo(w*0.82,h*0.92); g.lineTo(w*0.94,h*0.72);
    g.lineTo(w*0.94,h*0.28); g.lineTo(w*0.82,h*0.08); g.closePath();
    g.stroke();
    // windshield (facing down = player side)
    g.beginPath();
    g.moveTo(w*0.24,h*0.62); g.lineTo(w*0.28,h*0.78); g.lineTo(w*0.72,h*0.78); g.lineTo(w*0.76,h*0.62); g.closePath();
    g.fillStyle='rgba(160,60,60,0.5)'; g.fill();
    // headlights facing player
    g.save(); g.shadowColor='rgba(255,180,0,0.9)'; g.shadowBlur=w*0.15;
    g.fillStyle='#ffd060';
    g.beginPath(); g.ellipse(w*0.28,h*0.86,w*0.1,h*0.025,0,0,Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(w*0.72,h*0.86,w*0.1,h*0.025,0,0,Math.PI*2); g.fill();
    g.restore();
    // rear lights (top)
    g.save(); g.shadowColor='rgba(255,60,60,0.7)'; g.shadowBlur=w*0.1;
    g.fillStyle='#ff4444';
    g.beginPath(); g.ellipse(w*0.26,h*0.12,w*0.09,h*0.018,0,0,Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(w*0.74,h*0.12,w*0.09,h*0.018,0,0,Math.PI*2); g.fill();
    g.restore();
  } else if(type===1){
    // SUV / truck - dark gray
    g.save(); g.shadowColor='rgba(80,80,80,0.5)'; g.shadowBlur=w*0.2;
    g.beginPath(); g.roundRect(w*0.05,h*0.05,w*0.9,h*0.9,w*0.1); g.closePath();
    var bg=g.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#1c1c22'); bg.addColorStop(0.5,'#2e2e3a'); bg.addColorStop(1,'#181820');
    g.fillStyle=bg; g.fill(); g.restore();
    g.strokeStyle='#555'; g.lineWidth=1.5;
    g.beginPath(); g.roundRect(w*0.05,h*0.05,w*0.9,h*0.9,w*0.1); g.stroke();
    // grill
    g.fillStyle='#111'; g.beginPath(); g.roundRect(w*0.2,h*0.72,w*0.6,h*0.16,3); g.fill();
    g.strokeStyle='#444'; g.lineWidth=1;
    for(var i=0;i<4;i++){g.beginPath();g.moveTo(w*(0.25+i*0.14),h*0.72);g.lineTo(w*(0.25+i*0.14),h*0.88);g.stroke();}
    // headlights
    g.save(); g.shadowColor='rgba(255,200,80,0.9)'; g.shadowBlur=w*0.18;
    g.fillStyle='#ffe080';
    g.beginPath(); g.roundRect(w*0.08,h*0.75,w*0.18,h*0.1,2); g.fill();
    g.beginPath(); g.roundRect(w*0.74,h*0.75,w*0.18,h*0.1,2); g.fill();
    g.restore();
    // top running lights
    g.save(); g.shadowColor='rgba(255,80,80,0.7)'; g.shadowBlur=w*0.08;
    g.fillStyle='#ff5555';
    for(var j=0;j<4;j++){g.beginPath();g.roundRect(w*(0.1+j*0.2),h*0.07,w*0.15,h*0.04,2);g.fill();}
    g.restore();
    // windshield
    g.beginPath(); g.roundRect(w*0.15,h*0.58,w*0.7,h*0.14,3);
    g.fillStyle='rgba(100,100,140,0.45)'; g.fill();
  } else {
    // Sports car - yellow/black
    g.save(); g.shadowColor='rgba(200,160,0,0.5)'; g.shadowBlur=w*0.25;
    g.beginPath();
    g.moveTo(w*0.5,h*0.04); g.lineTo(w*0.85,h*0.18); g.lineTo(w*0.94,h*0.38);
    g.lineTo(w*0.94,h*0.72); g.lineTo(w*0.82,h*0.94); g.lineTo(w*0.18,h*0.94);
    g.lineTo(w*0.06,h*0.72); g.lineTo(w*0.06,h*0.38); g.lineTo(w*0.15,h*0.18); g.closePath();
    var bg=g.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#2a2000'); bg.addColorStop(0.5,'#6b5200'); bg.addColorStop(1,'#1e1600');
    g.fillStyle=bg; g.fill(); g.restore();
    g.strokeStyle='#f5a623'; g.lineWidth=1.5;
    g.beginPath();
    g.moveTo(w*0.5,h*0.04); g.lineTo(w*0.85,h*0.18); g.lineTo(w*0.94,h*0.38);
    g.lineTo(w*0.94,h*0.72); g.lineTo(w*0.82,h*0.94); g.lineTo(w*0.18,h*0.94);
    g.lineTo(w*0.06,h*0.72); g.lineTo(w*0.06,h*0.38); g.lineTo(w*0.15,h*0.18); g.closePath();
    g.stroke();
    // windshield
    g.beginPath(); g.moveTo(w*0.25,h*0.6); g.lineTo(w*0.3,h*0.76); g.lineTo(w*0.7,h*0.76); g.lineTo(w*0.75,h*0.6); g.closePath();
    g.fillStyle='rgba(200,160,0,0.3)'; g.fill();
    // headlights
    g.save(); g.shadowColor='rgba(255,220,0,1)'; g.shadowBlur=w*0.2;
    g.fillStyle='#ffe800';
    g.beginPath(); g.ellipse(w*0.22,h*0.88,w*0.1,h*0.025,0,0,Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(w*0.78,h*0.88,w*0.1,h*0.025,0,0,Math.PI*2); g.fill();
    g.restore();
    // accent stripe
    g.beginPath(); g.moveTo(w*0.5,h*0.04); g.lineTo(w*0.5,h*0.35);
    g.strokeStyle='rgba(245,166,35,0.5)'; g.lineWidth=w*0.1; g.stroke();
  }

  // shared wheels
  function ewheel(x,y){
    g.fillStyle='#0a0a0a'; g.strokeStyle='#2a2a2a'; g.lineWidth=1.5;
    g.beginPath(); g.ellipse(x,y,w*0.1,h*0.06,0,0,Math.PI*2); g.fill(); g.stroke();
    g.fillStyle='#333'; g.beginPath(); g.ellipse(x,y,w*0.06,h*0.035,0,0,Math.PI*2); g.fill();
  }
  ewheel(w*0.12,h*0.24); ewheel(w*0.88,h*0.24);
  ewheel(w*0.12,h*0.76); ewheel(w*0.88,h*0.76);

  return c;
}

function makeCoin(r){
  var c=document.createElement('canvas');
  c.width=r*2; c.height=r*2;
  var g=c.getContext('2d');
  g.save(); g.shadowColor='rgba(255,210,0,0.8)'; g.shadowBlur=r*0.5;
  var gr=g.createRadialGradient(r*0.7,r*0.7,r*0.1,r,r,r);
  gr.addColorStop(0,'#ffe566'); gr.addColorStop(0.6,'#f5a623'); gr.addColorStop(1,'#c87800');
  g.fillStyle=gr; g.beginPath(); g.arc(r,r,r*0.85,0,Math.PI*2); g.fill();
  g.restore();
  g.strokeStyle='rgba(255,255,200,0.4)'; g.lineWidth=1.5;
  g.beginPath(); g.arc(r,r,r*0.85,0,Math.PI*2); g.stroke();
  g.fillStyle='rgba(255,255,255,0.5)'; g.font='bold '+(r*0.9)+'px serif';
  g.textAlign='center'; g.textBaseline='middle'; g.fillText('$',r,r*1.05);
  return c;
}

/* ─── Road drawing ─── */
function drawRoad(roadLeft,roadW,roadY,h,laneW,laneCount){
  // asphalt base
  var rg=ctx.createLinearGradient(roadLeft,0,roadLeft+roadW,0);
  rg.addColorStop(0,'#131318'); rg.addColorStop(0.15,'#1a1b22');
  rg.addColorStop(0.5,'#1e1f28'); rg.addColorStop(0.85,'#1a1b22'); rg.addColorStop(1,'#131318');
  ctx.fillStyle=rg; ctx.fillRect(roadLeft,0,roadW,h);

  // subtle asphalt noise stripes
  ctx.save();
  for(var i=0;i<8;i++){
    var nx=roadLeft+Math.random()*roadW;
    ctx.strokeStyle='rgba(255,255,255,0.015)';
    ctx.lineWidth=Math.random()*3+1;
    ctx.beginPath(); ctx.moveTo(nx,0); ctx.lineTo(nx+Math.random()*10-5,h); ctx.stroke();
  }
  ctx.restore();

  // edge shadows
  var ls=ctx.createLinearGradient(roadLeft,0,roadLeft+roadW*0.08,0);
  ls.addColorStop(0,'rgba(0,0,0,0.5)'); ls.addColorStop(1,'transparent');
  ctx.fillStyle=ls; ctx.fillRect(roadLeft,0,roadW*0.08,h);
  var rs=ctx.createLinearGradient(roadLeft+roadW*0.92,0,roadLeft+roadW,0);
  rs.addColorStop(0,'transparent'); rs.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=rs; ctx.fillRect(roadLeft+roadW*0.92,0,roadW*0.08,h);

  // lane dashes
  var dashH=h*0.07, gapH=h*0.05;
  var offset=roadY%(dashH+gapH);
  ctx.save();
  for(var lane=1;lane<laneCount;lane++){
    var lx=roadLeft+lane*laneW;
    ctx.strokeStyle='rgba(232,224,200,0.55)'; ctx.lineWidth=2;
    ctx.setLineDash([dashH,gapH]); ctx.lineDashOffset=-offset;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,h); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();

  // solid edge lines
  ctx.strokeStyle='rgba(232,224,200,0.35)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(roadLeft+3,0); ctx.lineTo(roadLeft+3,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(roadLeft+roadW-3,0); ctx.lineTo(roadLeft+roadW-3,h); ctx.stroke();
}

function drawSidewalk(roadLeft,roadW,W,H,pillarsY){
  var sw=roadLeft; // sidewalk width

  // left sidewalk
  var lg=ctx.createLinearGradient(0,0,sw,0);
  lg.addColorStop(0,'#2a2215'); lg.addColorStop(1,'#1e1a10');
  ctx.fillStyle=lg; ctx.fillRect(0,0,sw,H);

  // right sidewalk
  var rg=ctx.createLinearGradient(roadLeft+roadW,0,W,0);
  rg.addColorStop(0,'#1e1a10'); rg.addColorStop(1,'#2a2215');
  ctx.fillStyle=rg; ctx.fillRect(roadLeft+roadW,0,sw,H);

  // tile lines on sidewalk
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  var seg=40;
  for(var y=-seg+pillarsY%seg;y<H+seg;y+=seg){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(sw,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(roadLeft+roadW,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.restore();

  // neon pillars / lampposts
  var postSpacing=90;
  var postX_L=sw*0.65, postX_R=roadLeft+roadW+sw*0.35;
  ctx.save();
  for(var py=-postSpacing+(pillarsY%postSpacing);py<H+postSpacing;py+=postSpacing){
    // left post
    ctx.strokeStyle='rgba(80,80,100,0.8)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(postX_L,py+postSpacing*0.9); ctx.lineTo(postX_L,py); ctx.stroke();
    // left lamp glow
    ctx.save(); ctx.shadowColor='rgba(255,220,120,0.8)'; ctx.shadowBlur=16;
    var lg2=ctx.createRadialGradient(postX_L,py,1,postX_L,py,sw*0.6);
    lg2.addColorStop(0,'rgba(255,220,120,0.35)'); lg2.addColorStop(1,'rgba(255,200,80,0)');
    ctx.fillStyle=lg2; ctx.beginPath(); ctx.arc(postX_L,py,sw*0.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffe070'; ctx.beginPath(); ctx.arc(postX_L,py,3,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // right post
    ctx.strokeStyle='rgba(80,80,100,0.8)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(postX_R,py+postSpacing*0.9); ctx.lineTo(postX_R,py); ctx.stroke();
    ctx.save(); ctx.shadowColor='rgba(255,220,120,0.8)'; ctx.shadowBlur=16;
    var rg2=ctx.createRadialGradient(postX_R,py,1,postX_R,py,sw*0.6);
    rg2.addColorStop(0,'rgba(255,220,120,0.35)'); rg2.addColorStop(1,'rgba(255,200,80,0)');
    ctx.fillStyle=rg2; ctx.beginPath(); ctx.arc(postX_R,py,sw*0.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffe070'; ctx.beginPath(); ctx.arc(postX_R,py,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

/* ─── PARTICLES ─── */
function Particle(x,y,vx,vy,col,life,r){
  this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.col=col;this.life=life;this.maxLife=life;this.r=r;
}
Particle.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.15;this.life--;};
Particle.prototype.draw=function(){
  var a=this.life/this.maxLife;
  ctx.save(); ctx.globalAlpha=a*0.8;
  ctx.fillStyle=this.col;
  ctx.beginPath(); ctx.arc(this.x,this.y,this.r*a,0,Math.PI*2); ctx.fill();
  ctx.restore();
};

/* ─── GAME CLASS ─── */
function Game(w,h){
  this.w=w; this.h=h;
  this.laneCount=3;
  this.particles=[];
  this.coins=[];
  this.coinTotal=0;
  this.combo=0; this.comboTimer=0;
  this.distanceTraveled=0;
  this._prerender();
  this._init();
}
Game.prototype._prerender=function(){
  var lw=this._calcLaneW(this.w);
  var pw=lw*0.62, ph=pw*1.85;
  this.playerImg=makePlayerCar(Math.round(pw),Math.round(ph));
  this.enemyImgs=[
    makeEnemyCar(Math.round(lw*0.65),Math.round(lw*0.65*1.6),0),
    makeEnemyCar(Math.round(lw*0.65),Math.round(lw*0.65*1.5),1),
    makeEnemyCar(Math.round(lw*0.65),Math.round(lw*0.65*1.7),2)
  ];
  this.coinImg=makeCoin(Math.round(lw*0.15));
};
Game.prototype._calcLaneW=function(w){
  var rl=w*0.1, rr=w*0.9;
  return (rr-rl)/this.laneCount;
};
Game.prototype._init=function(){
  var w=this.w,h=this.h;
  this.roadLeft=w*0.1; this.roadRight=w*0.9;
  this.roadW=this.roadRight-this.roadLeft;
  this.laneW=this.roadW/this.laneCount;
  this.playerW=this.laneW*0.62; this.playerH=this.playerW*1.85;
  this.playerLane=1;
  this.playerX=this._lc(1)-this.playerW/2;
  this.playerTargetX=this.playerX;
  this.playerY=h*0.70;
  this.playerAngle=0; this.playerAngleTarget=0;
  this.roadY=0; this.pillarsY=0;
  this.enemies=[]; this.enemyTimer=0;
  this.coins=[]; this.coinTimer=0;
  this.score=0; this.lives=3; this.scoreTimer=0;
  this.dead=false; this.invincible=0; this.flash=0;
  this.speedMult=1; this.frame=0;
  this.particles=[];
  this.combo=0; this.comboTimer=0;
  this.distanceTraveled=0;
  this.coinTotal=0;
  this.skidMarks=[];
};
Game.prototype.resize=function(w,h){
  this.w=w; this.h=h;
  this.roadLeft=w*0.1; this.roadRight=w*0.9;
  this.roadW=this.roadRight-this.roadLeft;
  this.laneW=this.roadW/this.laneCount;
  this.playerW=this.laneW*0.62; this.playerH=this.playerW*1.85;
  this.playerTargetX=this._lc(this.playerLane)-this.playerW/2;
  this._prerender();
};
Game.prototype._lc=function(i){return this.roadLeft+i*this.laneW+this.laneW/2;};
Game.prototype.moveLeft=function(){
  if(this.playerLane>0&&!this.dead){
    this.playerLane--; this.playerTargetX=this._lc(this.playerLane)-this.playerW/2;
    this.playerAngleTarget=-0.45;
    this._addSkid();
  }
};
Game.prototype.moveRight=function(){
  if(this.playerLane<this.laneCount-1&&!this.dead){
    this.playerLane++; this.playerTargetX=this._lc(this.playerLane)-this.playerW/2;
    this.playerAngleTarget=0.45;
    this._addSkid();
  }
};
Game.prototype._addSkid=function(){
  var x=this.playerX+this.playerW/2, y=this.playerY+this.playerH*0.85;
  for(var i=0;i<6;i++){
    this.particles.push(new Particle(
      x+(Math.random()-0.5)*this.playerW*0.4,
      y+(Math.random()-0.5)*this.playerH*0.1,
      (Math.random()-0.5)*1.5, Math.random()*1.5+0.5,
      'rgba(60,50,40,0.6)', 25+Math.random()*15, 2+Math.random()*2
    ));
  }
};
Game.prototype._spawnEnemy=function(){
  var lane=Math.floor(Math.random()*this.laneCount);
  // avoid spawning on same lane as player if too close
  if(lane===this.playerLane && Math.random()<0.6) lane=(lane+1+Math.floor(Math.random()*2))%this.laneCount;
  var type=Math.floor(Math.random()*3);
  var img=this.enemyImgs[type];
  var ew=this.laneW*0.65, eh=img.height*(ew/img.width);
  this.enemies.push({
    lane:lane, x:this._lc(lane)-ew/2, y:-eh,
    w:ew, h:eh, speed:this.h*0.008*this.speedMult+this.h*0.003,
    img:img, passed:false
  });
};
Game.prototype._spawnCoin=function(){
  var lane=Math.floor(Math.random()*this.laneCount);
  var cr=this.laneW*0.15;
  this.coins.push({x:this._lc(lane)-cr,y:-cr*2,r:cr,speed:this.h*0.007*this.speedMult,alive:true});
};
Game.prototype.update=function(){
  if(this.dead)return;
  this.frame++;
  this.speedMult=1+this.frame/2500;
  var spd=this.h*0.008*this.speedMult;
  this.roadY=(this.roadY+spd*2.5)%(this.h*0.12);
  this.pillarsY=(this.pillarsY+spd*2.5)%90;
  this.distanceTraveled+=spd;

  // player
  this.playerX+=(this.playerTargetX-this.playerX)*0.14;
  if(Math.abs(this.playerX-this.playerTargetX)<this.playerW*0.25)this.playerAngleTarget=0;
  this.playerAngle+=(this.playerAngleTarget-this.playerAngle)*0.13;

  // score
  if(++this.scoreTimer>=5){this.score+=10;this.scoreTimer=0;}

  // enemy spawn
  this.enemyTimer++;
  var interval=Math.max(40,110/this.speedMult);
  if(this.enemyTimer>=interval){this._spawnEnemy();this.enemyTimer=0;}

  // coin spawn
  this.coinTimer++;
  if(this.coinTimer>=180){this._spawnCoin();this.coinTimer=0;}

  // update enemies
  for(var i=0;i<this.enemies.length;i++){
    var e=this.enemies[i];
    e.y+=e.speed;
    if(!e.passed && e.y>this.playerY+this.playerH){
      e.passed=true;
      this.combo++;
      this.comboTimer=120;
      if(this.combo>=3){this.score+=this.combo*50;}
    }
  }
  this.enemies=this.enemies.filter(function(e){return e.y<this.h+e.h;}.bind(this));

  // update coins
  for(var ci=0;ci<this.coins.length;ci++){
    var co=this.coins[ci];
    co.y+=co.speed;
    // collect
    if(co.alive){
      var cx=co.x+co.r, cy=co.y+co.r;
      var px=this.playerX+this.playerW/2, py=this.playerY+this.playerH/2;
      var dist=Math.sqrt((cx-px)*(cx-px)+(cy-py)*(cy-py));
      if(dist<co.r+this.playerW*0.4){
        co.alive=false;
        this.coinTotal++;
        this.score+=100;
        this._coinBurst(cx,cy);
        showCoinFlash();
      }
    }
  }
  this.coins=this.coins.filter(function(c){return c.y<this.h+c.r*2&&c.alive;}.bind(this));

  // combo timer
  if(this.comboTimer>0){this.comboTimer--;}
  else if(this.combo>0){this.combo=0;}

  // collision
  if(this.invincible>0){this.invincible--;}else{
    for(var j=0;j<this.enemies.length;j++){
      var en=this.enemies[j];
      if(this._overlap(
        this.playerX+this.playerW*0.13,this.playerY+this.playerH*0.07,this.playerW*0.74,this.playerH*0.86,
        en.x+en.w*0.1,en.y+en.h*0.05,en.w*0.8,en.h*0.9)){
        this.lives--;this.flash=25;this.invincible=100;
        this.combo=0; this.comboTimer=0;
        this._crashBurst(this.playerX+this.playerW/2,this.playerY+this.playerH/2);
        if(this.lives<=0){this.dead=true;stopMusic();}
        break;
      }
    }
  }
  if(this.flash>0)this.flash--;

  // particles
  for(var pi=0;pi<this.particles.length;pi++)this.particles[pi].update();
  this.particles=this.particles.filter(function(p){return p.life>0;});
};
Game.prototype._coinBurst=function(x,y){
  for(var i=0;i<12;i++){
    var a=Math.random()*Math.PI*2;
    var spd=Math.random()*3+1;
    this.particles.push(new Particle(x,y,Math.cos(a)*spd,Math.sin(a)*spd-1,'#f5a623',20+Math.random()*10,3));
  }
};
Game.prototype._crashBurst=function(x,y){
  var cols=['#e63946','#ff8800','#ffcc00','#fff'];
  for(var i=0;i<24;i++){
    var a=Math.random()*Math.PI*2, spd=Math.random()*5+2;
    var col=cols[Math.floor(Math.random()*cols.length)];
    this.particles.push(new Particle(x,y,Math.cos(a)*spd,Math.sin(a)*spd-2,col,30+Math.random()*20,2+Math.random()*3));
  }
};
Game.prototype._overlap=function(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
};

Game.prototype.draw=function(){
  var w=this.w,h=this.h;
  ctx.clearRect(0,0,w,h);
  // bg
  ctx.fillStyle='var(--c-bg)'; ctx.fillStyle='#0b0c10'; ctx.fillRect(0,0,w,h);

  drawSidewalk(this.roadLeft,this.roadW,w,h,this.pillarsY);
  drawRoad(this.roadLeft,this.roadW,this.roadY,h,this.laneW,this.laneCount);

  // particles (behind cars)
  for(var pi=0;pi<this.particles.length;pi++)this.particles[pi].draw();

  // coins
  for(var ci=0;ci<this.coins.length;ci++){
    var co=this.coins[ci];
    if(!co.alive)continue;
    ctx.save();
    ctx.shadowColor='rgba(255,200,0,0.6)'; ctx.shadowBlur=8;
    ctx.drawImage(this.coinImg,co.x,co.y,co.r*2,co.r*2);
    ctx.restore();
  }

  // enemies
  for(var ei=0;ei<this.enemies.length;ei++){
    var en=this.enemies[ei];
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=10;
    ctx.drawImage(en.img,en.x,en.y,en.w,en.h);
    ctx.restore();
  }

  // player
  var blink=this.invincible===0||Math.floor(this.invincible/5)%2===0;
  if(blink){
    var px=this.playerX,py=this.playerY,pw=this.playerW,ph=this.playerH,ang=this.playerAngle;
    var cx=px+pw/2,cy=py+ph/2;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(ang);
    // headlight beam
    ctx.save();
    var beam=ctx.createConicalGradient ? null : null;
    var bg2=ctx.createRadialGradient(0,-ph*0.3,2,0,-ph*0.5,ph*0.55);
    bg2.addColorStop(0,'rgba(200,235,255,0.35)'); bg2.addColorStop(1,'rgba(180,220,255,0)');
    ctx.fillStyle=bg2;
    ctx.beginPath(); ctx.ellipse(0,-ph*0.3,pw*0.5,ph*0.5,0,Math.PI,2*Math.PI); ctx.fill();
    ctx.restore();
    // shadow
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=pw*0.3; ctx.shadowOffsetY=8;
    ctx.drawImage(this.playerImg,-pw/2,-ph/2,pw,ph);
    ctx.restore();
    ctx.restore();
  }

  // crash flash
  if(this.flash>0){
    ctx.fillStyle='rgba(220,50,50,'+(this.flash/40)+')';
    ctx.fillRect(0,0,w,h);
  }
};

function updateLives(n){
  livesRow.innerHTML='';
  for(var i=0;i<3;i++){
    var s=document.createElement('svg');
    s.setAttribute('class','hrt');
    s.setAttribute('viewBox','0 0 24 24');
    var p=document.createElement('path');
    p.setAttribute('d','M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z');
    p.setAttribute('fill',i<n?'#e63946':'rgba(255,255,255,0.15)');

function startGame(){
  mainOverlay.classList.add('hidden');
  pauseOverlay.classList.add('hidden');
  if(animId)cancelAnimationFrame(animId);
  game=new Game(W,H);
  running=true; paused=false;
  pauseBtn.style.display='block';
  initMusic();
  loop();
}

function loop(){
  if(!running||paused)return;
  game.resize(W,H);
  game.update();
  game.draw();
  // HUD
  scoreLbl.textContent=game.score;
  bestLbl.textContent='BEST: '+Math.max(bestScore,game.score);
  updateLives(game.lives);
  var sp=Math.min(100,((game.speedMult-1)/1.5)*100);
  speedFill.style.width=sp+'%';
  updateComboUI(game.combo);
  if(game.dead){
    running=false; paused=false;
    pauseBtn.style.display='none';
    saveBest(game.score);
    showGameOver();
    return;
  }
  animId=requestAnimationFrame(loop);
}

function showGameOver(){
  ovTag.textContent='Game Over';
  ovTitle.innerHTML='YOU<br><span>CRASHED</span>';
  ovSub.style.display='none';
  ovStats.style.display='flex';
  ovStatScore.textContent=game?game.score:0;
  ovStatBest.textContent=bestScore;
  ovStatCoins.textContent=game?game.coinTotal:0;
  startBtn.textContent='RETRY';
  startSecBtn.style.display='block';
  mainOverlay.classList.remove('hidden');
}

function togglePause(){
  if(!running||!game||game.dead)return;
  paused=!paused;
  if(paused){pauseMusic();pauseOverlay.classList.remove('hidden');pauseBtn.textContent='> PLAY';}
  else{resumeMusic();pauseOverlay.classList.add('hidden');pauseBtn.textContent='|| PAUSE';loop();}
}

startBtn.addEventListener('click',startGame);
startSecBtn.addEventListener('click',function(){
  ovTag.textContent='Street Racing';
  ovTitle.innerHTML='MAYAMI<br><span>DRIFT</span>';
  ovSub.style.display='block'; ovStats.style.display='none';
  startBtn.textContent='PLAY'; startSecBtn.style.display='none';
});
pauseBtn.addEventListener('click',togglePause);
resumeBtn.addEventListener('click',togglePause);
pauseRestartBtn.addEventListener('click',startGame);

/* ── touch / keys ── */
var txStart=null,tyStart=null;
canvas.addEventListener('touchstart',function(e){
  if(!running||!game||paused)return;
  txStart=e.touches[0].clientX; tyStart=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',function(e){
  if(!running||!game||paused||txStart===null)return;
  var dx=e.changedTouches[0].clientX-txStart;
  var dy=e.changedTouches[0].clientY-tyStart;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>16){if(dx<0)game.moveLeft();else game.moveRight();}
  txStart=null;
},{passive:true});
document.getElementById('ctrlLeft').addEventListener('click',function(){if(game&&running&&!paused)game.moveLeft();});
document.getElementById('ctrlRight').addEventListener('click',function(){if(game&&running&&!paused)game.moveRight();});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'){if(game&&running&&!paused)game.moveLeft();}
  else if(e.key==='ArrowRight'||e.key==='d'){if(game&&running&&!paused)game.moveRight();}
  else if(e.key===' '||e.key==='Escape')togglePause();
});

/* init */
updateLives(3);
bestLbl.textContent='BEST: '+bestScore;
})();
</script>
</body>
</html>
